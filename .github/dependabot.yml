version: 2
updates:
  # Python connector
  - package-ecosystem: "pip"
    directory: "/python/connector"
    target-branch: "main"
    schedule:
      interval: "weekly"
  - package-ecosystem: "pip"
    directory: "/python/connector/examples/asyncpg"
    schedule:
      interval: "weekly"
  - package-ecosystem: "pip"
    directory: "/python/connector/examples/psycopg"
    schedule:
      interval: "weekly"
  - package-ecosystem: "pip"
    directory: "/python/connector/examples/psycopg2"
    schedule:
      interval: "weekly"

  # Node.js connectors
  # Use 'directories' (plural) so the connector and its examples are
  # updated in the same PR, keeping lockfiles consistent.
  - package-ecosystem: "npm"
    directories:
      - "/node/node-postgres"
      - "/node/node-postgres/example"
    schedule:
      interval: "weekly"
    groups:
      dev-dependencies:
        dependency-type: "development"
  - package-ecosystem: "npm"
    directories:
      - "/node/postgres-js"
      - "/node/postgres-js/example"
      - "/node/postgres-js/example/src/alternatives/websocket"
    schedule:
      interval: "weekly"
    groups:
      dev-dependencies:
        dependency-type: "development"

  # Java connector
  - package-ecosystem: "gradle"
    directory: "/java/jdbc"
    schedule:
      interval: "weekly"
    ignore:
      # JUnit 6.x requires Java 17+, project targets Java 8
      - dependency-name: "org.junit.platform:*"
        versions: [">=6.0.0"]
      - dependency-name: "org.junit.jupiter:*"
        versions: [">=6.0.0"]
      # JGit 7.x breaks JReleaser GPG signing. Keep pinned to 5.13.x.
      # See: https://github.com/jreleaser/jreleaser/issues/1643
      - dependency-name: "org.eclipse.jgit:*"
        versions: [">=6.0.0"]

  # Go connector
  # Use 'directories' (plural) so the connector and its example are
  # updated in the same PR, keeping go.mod files consistent.
  - package-ecosystem: "gomod"
    directories:
      - "/go/pgx"
      - "/go/pgx/example"
    schedule:
      interval: "weekly"
    groups:
      aws-sdk:
        patterns:
          - "github.com/aws/*"

  # Ruby connector
  - package-ecosystem: "bundler"
    directories:
      - "/ruby/pg"
      - "/ruby/pg/example"
    schedule:
      interval: "weekly"

  # Rust connector
  - package-ecosystem: "cargo"
    directory: "/rust/sqlx"
    schedule:
      interval: "weekly"

  # .NET connector
  - package-ecosystem: "nuget"
    directories:
      - "/dotnet/npgsql/src/Amazon.AuroraDsql.Npgsql"
      - "/dotnet/npgsql/example"
    schedule:
      interval: "weekly"

  # GitHub Actions
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
