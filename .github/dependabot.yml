version: 2
updates:
  # Python connector
  - package-ecosystem: "pip"
    directory: "/python/connector"
    target-branch: "main"
    schedule:
      interval: "weekly"
  - package-ecosystem: "pip"
    directory: "/python/connector/examples/asyncpg"
    schedule:
      interval: "weekly"
  - package-ecosystem: "pip"
    directory: "/python/connector/examples/psycopg"
    schedule:
      interval: "weekly"
  - package-ecosystem: "pip"
    directory: "/python/connector/examples/psycopg2"
    schedule:
      interval: "weekly"

  # Node.js connectors
  - package-ecosystem: "npm"
    directory: "/node/node-postgres"
    schedule:
      interval: "weekly"
    groups:
      dev-dependencies:
        dependency-type: "development"
  - package-ecosystem: "npm"
    directory: "/node/node-postgres/example"
    schedule:
      interval: "weekly"
  - package-ecosystem: "npm"
    directory: "/node/postgres-js"
    schedule:
      interval: "weekly"
    groups:
      dev-dependencies:
        dependency-type: "development"
  - package-ecosystem: "npm"
    directory: "/node/postgres-js/example"
    schedule:
      interval: "weekly"
  - package-ecosystem: "npm"
    directory: "/node/postgres-js/example/src/alternatives/websocket"
    schedule:
      interval: "weekly"

  # Java connector
  - package-ecosystem: "gradle"
    directory: "/java/jdbc"
    schedule:
      interval: "weekly"
    ignore:
      # JUnit 6.x requires Java 17+, project targets Java 8
      - dependency-name: "org.junit.platform:*"
        versions: [">=6.0.0"]
      - dependency-name: "org.junit.jupiter:*"
        versions: [">=6.0.0"]
      # JGit 7.x breaks JReleaser GPG signing. Keep pinned to 5.13.x.
      # See: https://github.com/jreleaser/jreleaser/issues/1643
      - dependency-name: "org.eclipse.jgit:*"
        versions: [">=6.0.0"]

  # Go connector
  - package-ecosystem: "gomod"
    directory: "/go/pgx"
    schedule:
      interval: "weekly"
    groups:
      aws-sdk:
        patterns:
          - "github.com/aws/*"
  - package-ecosystem: "gomod"
    directory: "/go/pgx/example"
    schedule:
      interval: "weekly"
    groups:
      aws-sdk:
        patterns:
          - "github.com/aws/*"

  # GitHub Actions
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    ignore:
      - dependency-name: "gitleaks/gitleaks-action"
