name: Publish Rust SQLx Connector to crates.io

permissions: {}

on:
  push:
    tags:
      - "rust/sqlx/v*"

defaults:
  run:
    working-directory: rust/sqlx

jobs:
  wait-for-ci:
    name: Wait for CI to pass
    runs-on: ubuntu-latest
    steps:
      - uses: lewagon/wait-on-check-action@78dd4dd5d9b337c14c3c81f79e53bf7d222435c1 # v1.6.1
        with:
          ref: ${{ github.sha }}
          running-workflow-name: "Wait for CI to pass"
          repo-token: ${{ secrets.GITHUB_TOKEN }}
          wait-interval: 30
          check-regexp: "^build$"

  publish:
    needs: wait-for-ci
    runs-on: ubuntu-latest
    environment: rust
    permissions:
      id-token: write # required for requesting the JWT
      contents: read # required for actions/checkout
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Install Rust toolchain
        run: rustup update stable && rustup default stable

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@ec61189d14ec14c8efccab744f656cffd0e33f37 # v6
        with:
          role-to-assume: ${{ secrets.CRATES_PUBLISH_IAM_ROLE }}
          role-session-name: rust-sqlx-crates-publish
          aws-region: us-east-1

      - name: Get crates.io API Key
        run: |
          SECRET_JSON=$(aws secretsmanager get-secret-value \
            --secret-id "prod/cratesio/account-credentials" \
            --query 'SecretString' \
            --output text)
          CRATES_IO_KEY=$(echo "$SECRET_JSON" | jq -r '.["Github API Key"]')
          echo "::add-mask::$CRATES_IO_KEY"
          echo "CRATES_IO_KEY=$CRATES_IO_KEY" >> "$GITHUB_ENV"

      - name: Set version from tag
        run: |
          VERSION="${GITHUB_REF_NAME#rust/sqlx/v}"
          echo "Publishing version $VERSION"
          sed -i "s/^version = .*/version = \"$VERSION\"/" Cargo.toml

      - name: Publish to crates.io
        run: cargo publish --allow-dirty
        env:
          CARGO_REGISTRY_TOKEN: ${{ env.CRATES_IO_KEY }}

  update-changelog:
    needs: publish
    permissions:
      contents: write
      pull-requests: write
    uses: ./.github/workflows/update-changelog.yml
    with:
      tag: ${{ github.ref_name }}
    secrets: inherit
