name: Setup Packagist Webhook

permissions: {}

on:
  workflow_dispatch:

jobs:
  setup-webhook:
    name: Configure Packagist webhook on mirror repo
    runs-on: ubuntu-latest
    permissions:
      id-token: write # required for aws-actions/configure-aws-credentials
    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@e3dd6a429d7300a6a4c196c26e071d42e0343502 # v4.0.2
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME }}
          aws-region: us-east-1

      - name: Get Packagist API token from Secrets Manager
        id: get-token
        run: |
          SECRET=$(aws secretsmanager get-secret-value \
            --secret-id prod/packagist/credentials \
            --query SecretString \
            --output text)
          TOKEN=$(echo "$SECRET" | jq -r .token)
          echo "::add-mask::$TOKEN"
          echo "token=$TOKEN" >> "$GITHUB_OUTPUT"

      - name: Configure webhook on mirror repository
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PACKAGIST_TOKEN: ${{ steps.get-token.outputs.token }}
        run: |
          # Check if webhook already exists
          EXISTING=$(gh api repos/awslabs/aurora-dsql-php-pdo-pgsql/hooks \
            --jq '.[] | select(.config.url | contains("packagist.org")) | .id' || echo "")

          if [ -n "$EXISTING" ]; then
            echo "Webhook already exists (ID: $EXISTING), updating..."
            gh api -X PATCH "repos/awslabs/aurora-dsql-php-pdo-pgsql/hooks/$EXISTING" \
              -f config[url]='https://packagist.org/api/github?username=dsql-devex' \
              -f config[content_type]='json' \
              -f config[secret]="$PACKAGIST_TOKEN" \
              -f events[]='push' \
              -F active=true
            echo "✓ Webhook updated"
          else
            echo "Creating new webhook..."
            gh api repos/awslabs/aurora-dsql-php-pdo-pgsql/hooks \
              -f name='web' \
              -f config[url]='https://packagist.org/api/github?username=dsql-devex' \
              -f config[content_type]='json' \
              -f config[secret]="$PACKAGIST_TOKEN" \
              -f events[]='push' \
              -F active=true
            echo "✓ Webhook created"
          fi

          echo ""
          echo "Packagist webhook configured successfully!"
          echo "Package: https://packagist.org/packages/awslabs/aurora-dsql-pdo-pgsql"
