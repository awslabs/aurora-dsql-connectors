name: Deploy Java JDBC to Maven Central

permissions: {}

on:
  push:
    tags:
      - "java/jdbc/v*"

defaults:
  run:
    working-directory: java/jdbc

jobs:
  wait-for-ci:
    name: Wait for CI to pass
    runs-on: ubuntu-latest
    steps:
      - uses: lewagon/wait-on-check-action@9312864dfbc9fd208e9c0417843430751c042800 # v1.7.0
        with:
          ref: ${{ github.sha }}
          running-workflow-name: "Wait for CI to pass"
          repo-token: ${{ secrets.GITHUB_TOKEN }}
          wait-interval: 30
          check-regexp: "Unit Tests|Gradle Integration Tests|Integration Tests \\(Java"

  deploy:
    needs: wait-for-ci
    runs-on: ubuntu-latest
    environment: maven
    permissions:
      id-token: write # required for requesting the JWT
      contents: read # required for actions/checkout
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Set up JDK 25
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5
        with:
          java-version: "25"
          distribution: "corretto"

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@ec61189d14ec14c8efccab744f656cffd0e33f37 # v6
        with:
          role-to-assume: ${{ secrets.MAVEN_PUBLISH_IAM_ROLE }}
          role-session-name: java-jdbc-maven-publish
          aws-region: us-east-1

      - name: Get Maven Central Credentials
        run: |
          SECRET_JSON=$(aws secretsmanager get-secret-value \
            --secret-id "prod/maven/publishing-credentials" \
            --query 'SecretString' \
            --output text)
          USERNAME=$(echo "$SECRET_JSON" | jq -r '.publish_username')
          PASSWORD=$(echo "$SECRET_JSON" | jq -r '.publish_password')
          echo "::add-mask::$USERNAME"
          echo "::add-mask::$PASSWORD"
          echo "SONATYPE_USERNAME=$USERNAME" >> "$GITHUB_ENV"
          echo "SONATYPE_PASSWORD=$PASSWORD" >> "$GITHUB_ENV"

      - name: Get GPG Signing Key
        run: |
          SECRET_JSON=$(aws secretsmanager get-secret-value \
            --secret-id "prod/maven/gpg-signing-key" \
            --query 'SecretString' \
            --output text)
          GPG_PASSPHRASE=$(echo "$SECRET_JSON" | jq -r '.gpg_passphrase')
          GPG_PUBLIC_KEY=$(echo "$SECRET_JSON" | jq -r '.gpg_public_key')
          GPG_SECRET_KEY=$(echo "$SECRET_JSON" | jq -r '.gpg_secret_key')

          echo "::add-mask::$GPG_PASSPHRASE"
          echo "$GPG_PUBLIC_KEY" | while IFS= read -r line; do echo "::add-mask::$line"; done
          echo "$GPG_SECRET_KEY" | while IFS= read -r line; do echo "::add-mask::$line"; done

          {
            echo "GPG_PASSPHRASE=$GPG_PASSPHRASE"
            echo "GPG_PUBLIC_KEY<<GPGPUBEOF"
            echo "$GPG_PUBLIC_KEY"
            echo "GPGPUBEOF"
            echo "GPG_SECRET_KEY<<GPGSECEOF"
            echo "$GPG_SECRET_KEY"
            echo "GPGSECEOF"
          } >> "$GITHUB_ENV"

      - name: Extract version from tag
        run: |
          VERSION="${GITHUB_REF_NAME#java/jdbc/v}"
          echo "PROJECT_VERSION=$VERSION" >> "$GITHUB_ENV"
          echo "Building version $VERSION"

      - name: Deploy to Central Portal
        run: |
          ./gradlew build
          ./gradlew publish
          ./gradlew jreleaserDeploy --no-configuration-cache --stacktrace
        env:
          JRELEASER_MAVENCENTRAL_STAGE: "UPLOAD"
          JRELEASER_GPG_PUBLIC_KEY: ${{ env.GPG_PUBLIC_KEY }}
          JRELEASER_GPG_PASSPHRASE: ${{ env.GPG_PASSPHRASE }}
          JRELEASER_GPG_SECRET_KEY: ${{ env.GPG_SECRET_KEY }}
          JRELEASER_MAVENCENTRAL_USERNAME: ${{ env.SONATYPE_USERNAME }}
          JRELEASER_MAVENCENTRAL_PASSWORD: ${{ env.SONATYPE_PASSWORD }}

  update-changelog:
    needs: deploy
    permissions:
      contents: write
      pull-requests: write
    uses: ./.github/workflows/update-changelog.yml
    with:
      tag: ${{ github.ref_name }}
    secrets: inherit
