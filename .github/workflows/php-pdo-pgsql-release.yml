name: Publish PHP PDO_PGSQL to Packagist

permissions: {}

on:
  push:
    tags:
      - "php/pdo_pgsql/v*"

jobs:
  wait-for-ci:
    name: Wait for CI to pass
    runs-on: ubuntu-latest
    steps:
      - uses: lewagon/wait-on-check-action@96d9100b431964d10e0136aff8b9ccb92470505e # v1.8.0
        with:
          ref: ${{ github.sha }}
          running-workflow-name: "Wait for CI to pass"
          repo-token: ${{ secrets.GITHUB_TOKEN }}
          wait-interval: 30

  create-release:
    name: Create GitHub Release
    needs: wait-for-ci
    runs-on: ubuntu-latest
    permissions:
      contents: write
    # Note: Mirror repo sync happens automatically via scheduled workflow in
    # https://github.com/awslabs/aurora-dsql-php-pdo-pgsql (runs twice daily)
    # For urgent releases, manually trigger the sync workflow in the mirror repo
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Extract version from tag
        id: version
        run: |
          VERSION="${GITHUB_REF_NAME#php/pdo_pgsql/v}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Create Release
        run: |
          gh release create "${{ github.ref_name }}" \
            --title "PHP PDO_PGSQL v${{ steps.version.outputs.version }}" \
            --notes "Release ${{ steps.version.outputs.version }} - See [CHANGELOG](https://github.com/awslabs/aurora-dsql-connectors/blob/main/php/pdo_pgsql/CHANGELOG.md)" \
            --verify-tag
        env:
          GH_TOKEN: ${{ github.token }}

  update-changelog:
    needs: create-release
    permissions:
      contents: write
      pull-requests: write
    uses: ./.github/workflows/update-changelog.yml
    with:
      tag: ${{ github.ref_name }}
    secrets: inherit
