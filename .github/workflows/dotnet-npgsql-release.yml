name: Publish .NET Npgsql Connector to NuGet

permissions: {}

on:
  push:
    tags:
      - "dotnet/npgsql/v*"

defaults:
  run:
    working-directory: dotnet/npgsql/src/Amazon.AuroraDsql.Npgsql

jobs:
  wait-for-ci:
    name: Wait for CI to pass
    runs-on: ubuntu-latest
    steps:
      - uses: lewagon/wait-on-check-action@9312864dfbc9fd208e9c0417843430751c042800 # v1.7.0
        with:
          ref: ${{ github.sha }}
          running-workflow-name: "Wait for CI to pass"
          repo-token: ${{ secrets.GITHUB_TOKEN }}
          wait-interval: 30
          check-regexp: "build"

  publish:
    needs: wait-for-ci
    runs-on: ubuntu-latest
    environment: .NET
    permissions:
      id-token: write # required for requesting the JWT
      contents: read # required for actions/checkout
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Setup .NET
        uses: actions/setup-dotnet@c2fa09f4bde5ebb9d1777cf28262a3eb3db3ced7 # v5
        with:
          dotnet-version: "8.0.x"

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@ec61189d14ec14c8efccab744f656cffd0e33f37 # v6
        with:
          role-to-assume: ${{ secrets.NUGET_PUBLISH_IAM_ROLE }}
          role-session-name: dotnet-npgsql-nuget-publish
          aws-region: us-west-2

      - name: Get NuGet API Key
        run: |
          SECRET_JSON=$(aws secretsmanager get-secret-value \
            --secret-id "production/build/AuroraDsql-nuget-api-key" \
            --query 'SecretString' \
            --output text)
          NUGET_API_KEY=$(echo "$SECRET_JSON" | jq -r '.Key')
          echo "::add-mask::$NUGET_API_KEY"
          echo "NUGET_API_KEY=$NUGET_API_KEY" >> "$GITHUB_ENV"

      - name: Set version from tag
        run: |
          VERSION="${GITHUB_REF_NAME#dotnet/npgsql/v}"
          echo "Publishing version $VERSION"
          sed -i "s/<Version>.*<\/Version>/<Version>$VERSION<\/Version>/" Amazon.AuroraDsql.Npgsql.csproj

      - name: Pack
        run: dotnet pack -c Release -o ./nupkg

      - name: Publish to NuGet
        run: dotnet nuget push ./nupkg/*.nupkg --api-key ${{ env.NUGET_API_KEY }} --source https://api.nuget.org/v3/index.json

  update-changelog:
    needs: publish
    permissions:
      contents: write
      pull-requests: write
    uses: ./.github/workflows/update-changelog.yml
    with:
      tag: ${{ github.ref_name }}
    secrets: inherit
