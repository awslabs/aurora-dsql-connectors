name: Publish Node Postgres

permissions: {}

on:
  push:
    tags:
      - "node/node-postgres/v*"

defaults:
  run:
    working-directory: node/node-postgres

jobs:
  wait-for-ci:
    name: Wait for CI to pass
    runs-on: ubuntu-latest
    steps:
      - uses: lewagon/wait-on-check-action@9312864dfbc9fd208e9c0417843430751c042800 # v1.7.0
        with:
          ref: ${{ github.sha }}
          running-workflow-name: "Wait for CI to pass"
          repo-token: ${{ secrets.GITHUB_TOKEN }}
          wait-interval: 30
          check-regexp: "Node-postgres tests"

  publish:
    needs: wait-for-ci
    runs-on: ubuntu-latest
    environment: NPM
    permissions:
      id-token: write # required for trusted publishing
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: "25"
          registry-url: "https://registry.npmjs.org"

      - name: Set version from tag
        run: |
          VERSION=${GITHUB_REF_NAME#node/node-postgres/v}
          echo "Setting version to $VERSION"
          npm version "$VERSION" --no-git-tag-version --allow-same-version

      - run: |
          npm ci
          npm run build:prod

      - run: npm publish --provenance

  update-changelog:
    needs: publish
    uses: ./.github/workflows/update-changelog.yml
    with:
      tag: ${{ github.ref_name }}
    secrets: inherit
